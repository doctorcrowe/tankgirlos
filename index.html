<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tank Girl OS</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --accent: #ff2d78;
    --accent2: #7c3aed;
    --bg: #0a0a14;
    --panel-bg: #0d0d1a;
    --text: #e0e0e0;
    --muted: #666;
    --online: #00ff88;
  }

  body {
    background: var(--bg);
    font-family: 'Courier New', monospace;
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Scanline overlay */
  body::after {
    content: '';
    position: fixed; inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent, transparent 2px,
      rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 4px
    );
    pointer-events: none;
    z-index: 100;
  }

  /* Header */
  .header {
    background: var(--panel-bg);
    border-bottom: 1px solid var(--accent);
    padding: 4px 12px;
    display: flex; align-items: center; justify-content: space-between;
    flex-shrink: 0;
  }
  .header-title { color: var(--accent); font-size: 9px; letter-spacing: 3px; text-transform: uppercase; }
  .header-right { display: flex; align-items: center; gap: 10px; }
  .header-dots { display: flex; gap: 5px; }
  .dot { width: 6px; height: 6px; border-radius: 50%; }

  /* Main layout */
  .main { display: flex; flex: 1; overflow: hidden; }

  /* Chat area 67% */
  .chat-area {
    flex: 0 0 67%;
    display: flex; flex-direction: column;
  }

  /* Avatar panel 33% */
  .avatar-panel {
    flex: 0 0 33%;
    background: var(--panel-bg);
    display: flex; flex-direction: column; align-items: center;
    padding: 12px 8px;
    position: relative; overflow: hidden;
    box-shadow: -1px 0 0 rgba(255,45,120,0.2);
  }

  /* Pixel grid on avatar panel */
  .avatar-panel::before {
    content: '';
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(255,45,120,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,45,120,0.03) 1px, transparent 1px);
    background-size: 8px 8px;
    pointer-events: none;
  }

  /* Corner bracket decorations */
  .corner { position: absolute; width: 8px; height: 8px; }
  .corner.tl { top: 6px; left: 6px; border-top: 1px solid var(--accent); border-left: 1px solid var(--accent); }
  .corner.tr { top: 6px; right: 6px; border-top: 1px solid var(--accent); border-right: 1px solid var(--accent); }
  .corner.bl { bottom: 6px; left: 6px; border-bottom: 1px solid var(--accent); border-left: 1px solid var(--accent); }
  .corner.br { bottom: 6px; right: 6px; border-bottom: 1px solid var(--accent); border-right: 1px solid var(--accent); }

  /* Inference bar */
  .inference-bar {
    background: var(--panel-bg);
    border-bottom: 1px solid rgba(124,58,237,0.2);
    padding: 5px 12px;
    display: flex; align-items: center; gap: 8px;
    flex-shrink: 0;
  }
  .inference-label { color: var(--accent2); font-size: 8px; letter-spacing: 2px; text-transform: uppercase; }
  .inference-model { color: var(--muted); font-size: 8px; }
  .inference-tokens { color: var(--accent); font-size: 8px; margin-left: auto; }
  .thinking-dots span {
    display: inline-block; width: 4px; height: 4px;
    background: var(--accent2); border-radius: 50%; margin: 0 1px;
    animation: think 1.2s infinite;
  }
  .thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
  .thinking-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes think { 0%,60%,100%{opacity:0.2} 30%{opacity:1} }

  /* Messages */
  .messages {
    flex: 1; overflow-y: auto; padding: 10px 12px;
    display: flex; flex-direction: column; gap: 8px;
  }
  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: rgba(255,45,120,0.3); border-radius: 2px; }

  .msg { font-size: 10px; line-height: 1.7; }
  .msg .speaker { font-size: 9px; letter-spacing: 1px; margin-bottom: 2px; }
  .msg.tank .speaker { color: var(--accent); }
  .msg.user .speaker { color: var(--accent2); }
  .msg .text { color: #ccc; padding-left: 4px; border-left: 2px solid rgba(255,45,120,0.2); }
  .msg.user .text { border-color: rgba(124,58,237,0.2); }

  /* Input bar */
  .input-area {
    border-top: 1px solid rgba(255,45,120,0.2);
    padding: 8px 12px;
    display: flex; gap: 8px; align-items: center;
    flex-shrink: 0; background: var(--panel-bg);
  }
  .prompt-symbol { color: var(--accent); font-size: 11px; flex-shrink: 0; }
  .input-box {
    flex: 1; background: transparent; border: none; outline: none;
    color: var(--text); font-family: inherit; font-size: 10px;
  }
  .input-box::placeholder { color: var(--muted); }
  .send-btn {
    background: var(--accent); color: white; border: none;
    padding: 4px 10px; font-family: inherit; font-size: 8px;
    letter-spacing: 1px; cursor: pointer; text-transform: uppercase;
    flex-shrink: 0;
  }
  .send-btn:hover { background: #ff5490; }
  .send-btn:disabled { background: #444; cursor: not-allowed; }

  /* Avatar sprite area */
  .sprite-container {
    position: relative;
    width: 100%; flex: 1;
    display: flex; align-items: center; justify-content: center;
    z-index: 1; min-height: 0;
  }

  .sprite-glow {
    position: absolute;
    width: 80px; height: 120px;
    background: radial-gradient(ellipse, rgba(255,45,120,0.15) 0%, transparent 70%);
    animation: glow-pulse 2s ease-in-out infinite;
    z-index: 0;
  }
  @keyframes glow-pulse { 0%,100%{opacity:0.5} 50%{opacity:1} }

  .sprite-emoji {
    font-size: 72px; line-height: 1;
    image-rendering: pixelated;
    filter: drop-shadow(0 0 10px var(--accent)) drop-shadow(0 0 20px rgba(255,45,120,0.4));
    animation: sprite-idle var(--anim-speed, 1.2s) ease-in-out infinite;
    z-index: 1; position: relative;
    cursor: pointer;
  }
  @keyframes sprite-idle {
    0%,100% { transform: translateY(0); }
    50%      { transform: translateY(-4px); }
  }
  .sprite-emoji.talking {
    animation: sprite-talk 0.15s steps(2) infinite;
  }
  @keyframes sprite-talk {
    0%  { transform: scaleX(1)   translateY(0); }
    50% { transform: scaleX(0.96) translateY(-2px); }
  }

  /* Uploaded image sprite */
  .sprite-img {
    max-width: 100%; max-height: 140px;
    image-rendering: pixelated;
    filter: drop-shadow(0 0 10px var(--accent)) saturate(1.2) contrast(1.1);
    animation: sprite-idle var(--anim-speed, 1.2s) ease-in-out infinite;
    z-index: 1; position: relative;
    cursor: pointer;
    object-fit: contain;
  }
  .sprite-img.talking {
    animation: sprite-talk 0.15s steps(2) infinite;
  }

  /* Sprite sheet mode: div with background-image */
  .sprite-sheet {
    image-rendering: pixelated;
    filter: drop-shadow(0 0 10px var(--accent)) saturate(1.2) contrast(1.1);
    animation: sprite-idle var(--anim-speed, 1.2s) ease-in-out infinite;
    z-index: 1; position: relative;
    cursor: pointer;
    background-repeat: no-repeat;
  }
  .sprite-sheet.talking {
    animation: sprite-talk 0.15s steps(2) infinite;
  }

  /* Character info below sprite */
  .char-name {
    color: var(--accent); font-size: 9px; letter-spacing: 3px;
    text-transform: uppercase; margin-top: 8px;
    text-shadow: 0 0 8px var(--accent);
  }
  .char-status {
    display: flex; align-items: center; gap: 4px;
    margin-top: 3px;
  }
  .status-dot {
    width: 5px; height: 5px; border-radius: 50%;
    background: var(--online); box-shadow: 0 0 6px var(--online);
    animation: blink-dot 2s ease-in-out infinite;
  }
  @keyframes blink-dot { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .status-text { color: var(--online); font-size: 7px; letter-spacing: 1px; }

  /* Stats */
  .char-stats {
    width: 100%; margin-top: 10px;
    border-top: 1px solid rgba(255,45,120,0.2); padding-top: 8px;
  }
  .stat-row { display: flex; justify-content: space-between; margin-bottom: 4px; align-items: center; }
  .stat-label { color: var(--muted); font-size: 7px; text-transform: uppercase; letter-spacing: 1px; }
  .stat-val { color: var(--accent); font-size: 7px; }
</style>
</head>
<body>

<div class="header">
  <span class="header-title" id="clock">// SYS INIT 00:00:00</span>
  <div class="header-right">
    <div class="header-dots">
      <div class="dot" style="background:var(--online);box-shadow:0 0 4px var(--online);"></div>
      <div class="dot" style="background:#ffaa00;"></div>
      <div class="dot" style="background:var(--accent);"></div>
    </div>
  </div>
</div>

<div class="main">
  <div class="chat-area" id="chatArea">
    <div class="inference-bar" id="inferenceBar">
      <span class="inference-label">// inference</span>
      <div class="thinking-dots" id="thinkingDots" style="display:none">
        <span></span><span></span><span></span>
      </div>
      <span class="inference-model" id="inferenceModel">kimi-k2-turbo</span>
      <span class="inference-tokens" id="inferenceTokens">0 tokens</span>
    </div>

    <div class="messages" id="messages">
      <div class="msg tank">
        <div class="speaker">[ TANK_GIRL ]</div>
        <div class="text">"Alright punk. System's hot. What are we blowing up today?"</div>
      </div>
    </div>

    <div class="input-area">
      <span class="prompt-symbol">&gt;_</span>
      <input class="input-box" id="userInput" placeholder="enter command..." autocomplete="off" />
      <button class="send-btn" id="sendBtn">Execute</button>
    </div>
  </div>
  <div class="avatar-panel" id="avatarPanel">
    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>

    <div class="sprite-container" id="spriteContainer">
      <div class="sprite-glow" id="spriteGlow"></div>
      <span class="sprite-emoji" id="spriteEmoji" title="Click to upload avatar">🤘</span>
    </div>

    <div class="char-name" id="charNameDisplay">TANK GIRL</div>
    <div class="char-status">
      <div class="status-dot"></div>
      <span class="status-text" id="moodLabel">ONLINE // FERAL</span>
    </div>

    <div class="char-stats">
      <div class="stat-row">
        <span class="stat-label">MODEL</span>
        <span class="stat-val" id="statModel">KIMI K2</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">TOKENS</span>
        <span class="stat-val" id="statTokens">0</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">MOOD</span>
        <span class="stat-val" id="statMood">FERAL</span>
      </div>
    </div>
  </div>
</div>

<script>
  function updateClock() {
    const now = new Date();
    const t = [now.getHours(), now.getMinutes(), now.getSeconds()]
      .map(n => String(n).padStart(2, '0')).join(':');
    document.getElementById('clock').textContent = `// SYS INIT ${t}`;
  }
  updateClock();
  setInterval(updateClock, 1000);

  // --- State ---
  const state = {
    messages: [], // {role, content} for API
    tokenCount: 0,
    characterName: 'TANK_GIRL',
    isStreaming: false,
  };

  // --- Message rendering ---
  function addMessage(role, text) {
    // Add to API history
    state.messages.push({ role, content: text });

    // Render in UI
    const div = document.createElement('div');
    div.className = `msg ${role === 'assistant' ? 'tank' : 'user'}`;

    const speaker = document.createElement('div');
    speaker.className = 'speaker';
    speaker.textContent = role === 'assistant'
      ? `[ ${state.characterName} ]`
      : '[ YOU ]';

    const textDiv = document.createElement('div');
    textDiv.className = 'text';
    textDiv.textContent = text;

    div.appendChild(speaker);
    div.appendChild(textDiv);
    document.getElementById('messages').appendChild(div);
    scrollToBottom();
    return textDiv; // returned so streaming can append to it
  }

  function scrollToBottom() {
    const m = document.getElementById('messages');
    m.scrollTop = m.scrollHeight;
  }

  // --- Send button ---
  document.getElementById('sendBtn').addEventListener('click', handleSend);
  document.getElementById('userInput').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); }
  });

  function handleSend() {
    const input = document.getElementById('userInput');
    const text = input.value.trim();
    if (!text || state.isStreaming) return;
    input.value = '';
    addMessage('user', text);
    // AI call wired up in Task 8
    console.log('send:', text);
  }

  // --- Avatar upload ---
  const avatarState = {
    type: 'emoji',      // 'emoji' | 'image' | 'spritesheet'
    emoji: '🤘',
    imageData: null,    // base64 data URL
    frameWidth: 64,
    frameHeight: 64,
    fps: 8,
    totalFrames: 1,
    _sheetInterval: null,
  };

  // Click emoji or image to trigger upload
  document.getElementById('spriteEmoji').addEventListener('click', () => {
    document.getElementById('avatarFileInput').click();
  });

  document.getElementById('avatarFileInput').addEventListener('change', e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      avatarState.imageData = ev.target.result;
      avatarState.type = 'image';
      renderAvatar();
      showSpriteSheetControls(true);
    };
    reader.readAsDataURL(file);
    // Reset input so same file can be re-selected
    e.target.value = '';
  });

  function renderAvatar() {
    // Always clear any running spritesheet interval before rebuilding
    if (avatarState._sheetInterval) {
      clearInterval(avatarState._sheetInterval);
      avatarState._sheetInterval = null;
    }
    const container = document.getElementById('spriteContainer');
    // Clear existing sprite (keep the glow div)
    const glow = document.getElementById('spriteGlow');
    container.innerHTML = '';
    container.appendChild(glow);

    if (avatarState.type === 'emoji') {
      const el = document.createElement('span');
      el.className = 'sprite-emoji';
      el.id = 'spriteEmoji';
      el.title = 'Click to upload avatar';
      el.textContent = avatarState.emoji;
      el.addEventListener('click', () => document.getElementById('avatarFileInput').click());
      container.appendChild(el);
      return;
    }

    if (avatarState.type === 'image') {
      const img = document.createElement('img');
      img.className = 'sprite-img';
      img.id = 'spriteImg';
      img.src = avatarState.imageData;
      img.title = 'Click to upload new avatar';
      img.addEventListener('click', () => document.getElementById('avatarFileInput').click());
      container.appendChild(img);
      return;
    }

    if (avatarState.type === 'spritesheet') {
      const el = document.createElement('div');
      el.className = 'sprite-sheet';
      el.id = 'spriteSheet';
      el.title = 'Click to upload new avatar';
      el.style.width = avatarState.frameWidth + 'px';
      el.style.height = avatarState.frameHeight + 'px';
      el.style.backgroundImage = `url("${avatarState.imageData}")`;
      el.style.backgroundPosition = '0px 0px';
      el.addEventListener('click', () => document.getElementById('avatarFileInput').click());
      container.appendChild(el);

      let frame = 0;
      avatarState._sheetInterval = setInterval(() => {
        frame = (frame + 1) % avatarState.totalFrames;
        el.style.backgroundPosition = `-${frame * avatarState.frameWidth}px 0px`;
      }, 1000 / avatarState.fps);
      return;
    }
  }

  // Animate sprite as "talking" while streaming
  function setTalking(on) {
    const targets = ['spriteEmoji', 'spriteImg', 'spriteSheet'];
    targets.forEach(id => {
      const el = document.getElementById(id);
      if (el) el.classList.toggle('talking', on);
    });
  }

  // showSpriteSheetControls is defined in Task 5 — stub it here so Task 4 upload doesn't break
  function showSpriteSheetControls(show) {
    const el = document.getElementById('spriteSheetControls');
    if (el) el.style.display = show ? 'block' : 'none';
  }
</script>

<input type="file" id="avatarFileInput" accept="image/*" style="display:none" />

</body>
</html>
